name: Security Check
on:
  workflow_call:
    inputs:
      severity-threshold:
        description: 'Minimum severity to block (moderate, high, critical)'
        required: false
        type: string
        default: 'moderate'
    secrets:
      token:
        description: 'GitHub token with dependabot alert read access (e.g. GH_PAT)'
        required: true

jobs:
  dependabot-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Dependabot Alerts
        env:
          GH_TOKEN: ${{ secrets.token }}
        run: |
          echo "Checking for ${{ inputs.severity-threshold }}+ severity dependabot alerts..."

          # Build jq filter based on severity threshold
          case "${{ inputs.severity-threshold }}" in
            critical)
              JQ_FILTER='[.[] | select(.state == "open" and .security_advisory.severity == "critical")]'
              ;;
            high)
              JQ_FILTER='[.[] | select(.state == "open" and (.security_advisory.severity == "critical" or .security_advisory.severity == "high"))]'
              ;;
            moderate|*)
              JQ_FILTER='[.[] | select(.state == "open" and (.security_advisory.severity == "critical" or .security_advisory.severity == "high" or .security_advisory.severity == "moderate"))]'
              ;;
          esac

          ALERTS=$(gh api repos/${{ github.repository }}/dependabot/alerts --jq "$JQ_FILTER")
          ALERT_COUNT=$(echo "$ALERTS" | jq 'length')

          if [ "$ALERT_COUNT" -gt 0 ]; then
            echo "::error::Found $ALERT_COUNT open dependabot alert(s) with ${{ inputs.severity-threshold }}+ severity"
            echo "::error::Please resolve these alerts before merging:"
            echo "$ALERTS" | jq -r '.[] | "- \(.security_advisory.severity | ascii_upcase): \(.dependency.package.name) - \(.security_advisory.summary)"'
            exit 1
          else
            echo "::notice::No ${{ inputs.severity-threshold }}+ severity dependabot alerts found."
          fi
